[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "workspace-browser"
version = "0.1.0"
description = "Pure-Python scientific workspace browser framework"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Scientific Workspace Browser" }]
dependencies = ["matplotlib>=3.7", "plotly>=5.0", "tomli>=2; python_version < '3.11'"]

[project.entry-points."workspace_browser.workspaces"]
generic-example = "workspace_browser.examples.profile:create_generic_workspace"
sigmf-viewer = "workspace_browser.examples.profile:create_sigmf_workspace"
sigmf-matplotlib-viewer = "workspace_browser.examples.profile:create_sigmf_matplotlib_workspace"
pri-waterfall = "workspace_browser.examples.profile:create_pri_workspace"

[project.scripts]
workspace-browser = "workspace_browser.web.application:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
workspace_browser = ["examples/data/*.sigmf-meta", "examples/data/*.sigmf-data"]
